apiVersion: apps/v1
kind: Deployment
metadata:
name: hospital-app

spec:
replicas: 2

selector:
matchLabels:
app: hospital-app

template:
metadata:
labels:
app: hospital-app

spec:
  containers:
  - name: hospital-app
    image: hospital.azurecr.io/hospital-app:latest

    ports:
    - containerPort: 80

    env:
    - name: DB_HOST
      valueFrom:
        secretKeyRef:
          name: hospital-secret
          key: DB_HOST

    - name: DB_NAME
      valueFrom:
        secretKeyRef:
          name: hospital-secret
          key: DB_NAME

    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: hospital-secret
          key: DB_USER

    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: hospital-secret
          key: DB_PASSWORD

