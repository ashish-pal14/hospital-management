apiVersion: apps/v1
kind: Deployment

metadata:
  name: hospital-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hospital-app

  template:
    metadata:
      labels:
        app: hospital-app

    spec:
      containers:
        - name: hospital-app
          image: hospital.azurecr.io/hospital-app:latest

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          ports:
            - containerPort: 8080

          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: hospital-secret
                  key: DB_HOST

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: hospital-secret
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: hospital-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hospital-secret
                  key: DB_PASSWORD
